<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><title>Patrón parcelario</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;background:var(--marfil-tecnico);display:flex;align-items:center;justify-content:center;height:100vh;padding:18px;font-family:var(--font-sans)}
  .frame{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:620px;height:280px}
  .tile{position:relative;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .a{background:var(--marfil-tecnico)}
  .b{background:var(--grafito-mineral)}
  .a svg path{stroke:#6E5A46;stroke-opacity:.45}
  .b svg path{stroke:#D8CCBB;stroke-opacity:.35}
  .lbl{position:absolute;left:10px;bottom:8px;font-family:var(--font-mono);font-size:10px;letter-spacing:.06em}
  .a .lbl{color:var(--fg-3)}
  .b .lbl{color:#B7BFC2}
</style></head>
<body>
  <div class="frame">
    <div class="tile a">
      <svg viewBox="0 0 300 220" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-width=".7">
        <path d="M0 30 H300 M0 70 H300 M0 110 H300 M0 150 H300 M0 190 H300"/>
        <path d="M40 0 V220 M90 0 V220 M150 0 V220 M210 0 V220 M260 0 V220"/>
        <path d="M40 30 L90 70 L150 30 L210 110 L260 70" stroke-width="1.2" stroke="#6E5A46" stroke-opacity=".8"/>
      </svg>
      <span class="lbl">Parcela · trama</span>
    </div>
    <div class="tile b">
      <svg viewBox="0 0 300 220" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-width=".7">
        <path d="M0 200 Q60 180 110 188 T220 178 T300 168"/>
        <path d="M0 180 Q60 158 110 170 T220 156 T300 144"/>
        <path d="M0 160 Q60 134 110 150 T220 134 T300 120"/>
        <path d="M0 140 Q60 110 110 130 T220 112 T300 96"/>
        <path d="M0 120 Q60 86 110 110 T220 90 T300 72"/>
        <path d="M0 100 Q60 62 110 90 T220 68 T300 48"/>
      </svg>
      <span class="lbl">Topografía · capas</span>
    </div>
  </div>
</body></html>
