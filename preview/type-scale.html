<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><title>Escala tipográfica</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;background:var(--marfil-tecnico);padding:24px 36px;font-family:var(--font-sans)}
  table{width:100%;border-collapse:collapse}
  td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:baseline}
  td.tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);width:80px;letter-spacing:.04em}
  td.spec{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:140px;text-align:right}
  .s-display{font-family:var(--font-serif);font-size:48px;line-height:1;letter-spacing:-.015em}
  .s-h1{font-family:var(--font-serif);font-size:36px;line-height:1.05;letter-spacing:-.012em}
  .s-h2{font-family:var(--font-serif);font-size:28px;line-height:1.1}
  .s-h3{font-weight:600;font-size:22px}
  .s-body{font-size:16px}
  .s-cap{font-size:12px;color:var(--fg-3);letter-spacing:.16em;text-transform:uppercase}
</style></head>
<body>
  <table>
    <tr><td class="tag">display</td><td><span class="s-display">Aa Suelo</span></td><td class="spec">Literata · 48–88</td></tr>
    <tr><td class="tag">h1</td><td><span class="s-h1">Aa Suelo</span></td><td class="spec">Literata · 36–56</td></tr>
    <tr><td class="tag">h2</td><td><span class="s-h2">Aa Suelo</span></td><td class="spec">Literata · 28–40</td></tr>
    <tr><td class="tag">h3</td><td><span class="s-h3">Aa Suelo</span></td><td class="spec">Manrope 600 · 22</td></tr>
    <tr><td class="tag">body</td><td><span class="s-body">Aa Suelo, hogar y futuro.</span></td><td class="spec">Manrope · 16</td></tr>
    <tr><td class="tag">eyebrow</td><td><span class="s-cap">Expediente Altaria</span></td><td class="spec">Manrope 500 · 12 · 0.16em</td></tr>
  </table>
</body></html>
