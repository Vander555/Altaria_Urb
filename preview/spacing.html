<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;background:var(--marfil-tecnico);padding:28px 36px;font-family:var(--font-sans);display:flex;flex-direction:column;justify-content:center;height:100vh;gap:8px}
  .row{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--fg-3);font-family:var(--font-mono)}
  .bar{height:14px;background:var(--tierra-profunda);border-radius:2px}
  .name{width:60px;color:var(--fg-1);font-weight:500}
  .px{width:54px;text-align:right;color:var(--fg-2)}
</style></head>
<body>
  <div class="row"><div class="name">--space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="name">--space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="name">--space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="name">--space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="name">--space-5</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="name">--space-6</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="name">--space-7</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="name">--space-8</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
  <div class="row"><div class="name">--space-9</div><div class="bar" style="width:96px"></div><div class="px">96px</div></div>
  <div class="row"><div class="name">--space-10</div><div class="bar" style="width:128px"></div><div class="px">128px</div></div>
</body></html>
