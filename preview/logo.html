<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><title>Altaria — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;background:var(--marfil-tecnico);display:flex;align-items:center;justify-content:center;height:100vh;padding:0 32px}
  .row{display:flex;align-items:center;gap:48px;width:100%;max-width:640px;justify-content:space-between}
  .lockup{display:flex;flex-direction:column;align-items:center;gap:8px}
  .lockup img{display:block;max-height:80px;width:auto}
  .lockup .lbl{font-family:var(--font-sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-3)}
  .dark{background:var(--grafito-mineral);padding:18px 22px;border-radius:6px}
</style></head>
<body>
  <div class="row">
    <div class="lockup">
      <img src="../assets/altaria-logo-horizontal-color.png" alt="Altaria horizontal" />
      <div class="lbl">Horizontal · primario</div>
    </div>
    <div class="lockup">
      <img src="../assets/altaria-isotipo.png" alt="Isotipo" style="max-height:72px" />
      <div class="lbl">Isotipo</div>
    </div>
    <div class="lockup">
      <div class="dark"><img src="../assets/altaria-logo-on-dark.png" alt="Sobre fondo oscuro" style="max-height:54px" /></div>
      <div class="lbl">Fondo oscuro</div>
    </div>
  </div>
</body></html>
