<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><title>KPIs · metodología</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;background:var(--marfil-tecnico);padding:24px;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;width:100%;max-width:680px;border-top:1px solid var(--line-strong);border-bottom:1px solid var(--line-strong)}
  .kpi{padding:18px 16px;border-right:1px solid var(--line)}
  .kpi:last-child{border-right:0}
  .v{font-family:var(--font-serif);font-size:30px;line-height:1;letter-spacing:-.01em;color:var(--fg-1);font-weight:400}
  .k{font-size:11px;color:var(--fg-3);letter-spacing:.1em;text-transform:uppercase;margin-top:6px}
</style></head>
<body>
  <div class="grid">
    <div class="kpi"><div class="v">0–48 h</div><div class="k">Triage inicial</div></div>
    <div class="kpi"><div class="v">7–10 d</div><div class="k">Ficha preliminar</div></div>
    <div class="kpi"><div class="v">14–21 d</div><div class="k">Dossier completo</div></div>
    <div class="kpi"><div class="v">100%</div><div class="k">Trazabilidad</div></div>
  </div>
</body></html>
