<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><title>Tarjeta de oportunidad</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;background:var(--marfil-tecnico);padding:24px;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:420px;background:var(--blanco-calido);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .hero{height:96px;background:linear-gradient(135deg,#D8CCBB 0%,#A89884 100%);position:relative;overflow:hidden}
  .hero svg{position:absolute;inset:0;width:100%;height:100%;opacity:.35}
  .body{padding:16px 20px}
  .row1{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--fg-3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
  .accent{color:var(--tierra-profunda);font-weight:500}
  h3{font-family:var(--font-serif);font-size:19px;line-height:1.25;letter-spacing:-.01em;margin:0 0 10px;color:var(--fg-1);font-weight:400}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:12px;color:var(--fg-2);margin-bottom:12px}
  .k{color:var(--fg-3);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase}
  .v{color:var(--fg-1);font-weight:500;font-family:var(--font-mono);font-size:12px}
  .ft{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:10px}
  .badge{display:inline-flex;align-items:center;gap:7px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:500;background:#EFE6CC;border:1px solid #D7C593;color:#705B23}
  .dot{width:6px;height:6px;border-radius:50%;background:#C2A661}
  .cta{font-size:12px;color:var(--fg-1);font-weight:500}
</style></head>
<body>
  <div class="card">
    <div class="hero">
      <svg viewBox="0 0 420 96" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="#6E5A46" stroke-width=".6">
          <path d="M0 70 L70 50 L130 56 L210 38 L280 44 L350 30 L420 36"/>
          <path d="M0 80 L70 62 L130 68 L210 50 L280 56 L350 42 L420 48"/>
          <path d="M0 88 L70 72 L130 78 L210 62 L280 68 L350 54 L420 60"/>
        </g>
      </svg>
    </div>
    <div class="body">
      <div class="row1"><span>Oportunidad · Cádiz</span><span class="accent">En análisis</span></div>
      <h3>Suelo residencial en área metropolitana</h3>
      <div class="grid">
        <div><div class="k">Superficie</div><div class="v">12.400 m²</div></div>
        <div><div class="k">Perfil</div><div class="v">Promotor / Gestora</div></div>
        <div><div class="k">Estado doc.</div><div class="v">En revisión</div></div>
        <div><div class="k">Score</div><div class="v">78 / 100</div></div>
      </div>
      <div class="ft">
        <span class="badge"><span class="dot"></span>Riesgo medio</span>
        <span class="cta">Solicitar información →</span>
      </div>
    </div>
  </div>
</body></html>
