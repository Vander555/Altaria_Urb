<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><title>Colores · marca</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;background:var(--marfil-tecnico);padding:32px 36px;font-family:var(--font-sans)}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px}
  .sw{display:flex;flex-direction:column;gap:10px}
  .chip{height:88px;border-radius:6px;border:1px solid var(--line)}
  .nm{font-size:13px;font-weight:600;color:var(--fg-1);letter-spacing:-.002em}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3)}
</style></head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#263238"></div><div class="nm">Grafito Mineral</div><div class="hex">#263238</div></div>
    <div class="sw"><div class="chip" style="background:#6E5A46"></div><div class="nm">Tierra Profunda</div><div class="hex">#6E5A46</div></div>
    <div class="sw"><div class="chip" style="background:#D8CCBB"></div><div class="nm">Arena Cálida</div><div class="hex">#D8CCBB</div></div>
    <div class="sw"><div class="chip" style="background:#F5F1EA"></div><div class="nm">Marfil Técnico</div><div class="hex">#F5F1EA</div></div>
    <div class="sw"><div class="chip" style="background:#6F7F6A"></div><div class="nm">Verde Horizonte</div><div class="hex">#6F7F6A</div></div>
  </div>
</body></html>
