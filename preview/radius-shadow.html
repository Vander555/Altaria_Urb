<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><title>Radii & shadows</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;background:var(--marfil-tecnico);padding:32px;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;min-height:100vh;gap:24px;flex-wrap:wrap}
  .grp{display:flex;flex-direction:column;gap:8px;align-items:center}
  .box{width:78px;height:60px;background:var(--blanco-calido);border:1px solid var(--line)}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
  .sect{display:flex;gap:14px;align-items:flex-end}
  .sep{width:1px;height:80px;background:var(--line);margin:0 12px}
  .title{font-size:11px;color:var(--tierra-profunda);letter-spacing:.16em;text-transform:uppercase;font-weight:500;width:100%;text-align:center}
</style></head>
<body>
  <div>
    <div class="title" style="margin-bottom:12px">Radii</div>
    <div class="sect">
      <div class="grp"><div class="box" style="border-radius:2px"></div><div class="lbl">2 · xs</div></div>
      <div class="grp"><div class="box" style="border-radius:4px"></div><div class="lbl">4 · sm</div></div>
      <div class="grp"><div class="box" style="border-radius:6px"></div><div class="lbl">6 · md</div></div>
      <div class="grp"><div class="box" style="border-radius:8px"></div><div class="lbl">8 · card</div></div>
      <div class="grp"><div class="box" style="border-radius:10px"></div><div class="lbl">10 · lg</div></div>
      <div class="grp"><div class="box" style="border-radius:14px"></div><div class="lbl">14 · xl</div></div>
    </div>
  </div>
  <div class="sep"></div>
  <div>
    <div class="title" style="margin-bottom:12px">Shadows</div>
    <div class="sect">
      <div class="grp"><div class="box" style="border-radius:8px;box-shadow:var(--shadow-1)"></div><div class="lbl">shadow-1</div></div>
      <div class="grp"><div class="box" style="border-radius:8px;box-shadow:var(--shadow-2)"></div><div class="lbl">shadow-2</div></div>
      <div class="grp"><div class="box" style="border-radius:8px;box-shadow:var(--shadow-3)"></div><div class="lbl">shadow-3</div></div>
    </div>
  </div>
</body></html>
