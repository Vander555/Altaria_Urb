<!doctype html>
<html lang="es"><head><meta charset="utf-8" /><title>Expediente Altaria</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body{margin:0;background:var(--arena-40);padding:24px;font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{width:340px;background:var(--blanco-calido);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow-2);overflow:hidden}
  .hd{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}
  .eyebrow{font-size:10.5px;color:var(--tierra-profunda);letter-spacing:.18em;text-transform:uppercase;font-weight:500}
  .ref{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3)}
  .title{padding:14px 18px 8px;font-family:var(--font-serif);font-size:18px;line-height:1.2;letter-spacing:-.01em}
  .rows{padding:0 18px 14px}
  .r{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line);font-size:12.5px}
  .r:first-child{border-top:0}
  .k{color:var(--fg-3)}
  .v{color:var(--fg-1);font-weight:500;font-family:var(--font-mono)}
  .ft{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:#F2EDE3;border-top:1px solid var(--line)}
  .badge{display:inline-flex;align-items:center;gap:8px;padding:5px 11px;border-radius:999px;font-size:11.5px;font-weight:500;background:#DCE2D7;border:1px solid #B4C0AB;color:#3F4D3B}
  .dot{width:7px;height:7px;border-radius:50%;background:#6F7F6A}
  .pill{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3)}
</style></head>
<body>
  <div class="card">
    <div class="hd">
      <span class="eyebrow">Expediente Altaria</span>
      <span class="ref">EA-0823 · 22.05.26</span>
    </div>
    <div class="title">Suelo residencial en área metropolitana</div>
    <div class="rows">
      <div class="r"><span class="k">Municipio</span><span class="v">Bahía de Cádiz</span></div>
      <div class="r"><span class="k">Superficie</span><span class="v">12.400 m²</span></div>
      <div class="r"><span class="k">Encaje urbanístico</span><span class="v">En revisión</span></div>
      <div class="r"><span class="k">Comprador objetivo</span><span class="v">Promotor / Gestora</span></div>
    </div>
    <div class="ft">
      <span class="badge"><span class="dot"></span>Estado: Go</span>
      <span class="pill">Score 78/100</span>
    </div>
  </div>
</body></html>
